<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Birthday Surprise</title>
<style>
body{
    font-family:'Poppins',sans-serif;
    text-align:center;
    color:white;
    padding-top:50px;
    background: linear-gradient(135deg,#ff758c,#ff7eb3,#ffb3c6,#ffe6f0);
    background-size: 400% 400%;
    animation: gradientShift 15s ease infinite;
    overflow-x:hidden;
}
@keyframes gradientShift{
    0%{background-position:0% 50%;}
    50%{background-position:100% 50%;}
    100%{background-position:0% 50%;}
}
h1{ font-size:40px; margin-bottom:20px; }
h2{ font-size:25px; margin-top:10px; }

.cake{
    font-size:100px;
    display:inline-block;
    animation:bounce 2s infinite, spin 8s linear infinite;
}
@keyframes bounce{
    0%,100%{transform:translateY(0);}
    50%{transform:translateY(-20px);}
}
@keyframes spin{
    0%{transform:rotate(0deg);}
    100%{transform:rotate(360deg);}
}

button{
    padding:12px 25px;
    font-size:16px;
    border:none;
    border-radius:30px;
    background:white;
    color:#ff4d6d;
    cursor:pointer;
    margin-top:20px;
}
button:hover{
    background:#ffe6ec;
}

#videoPopup{
    display:none;
    position:fixed;
    top:0; left:0;
    width:100%; height:100%;
    background: rgba(0,0,0,0.9);
    justify-content:center;
    align-items:center;
    flex-direction:column;
    z-index:999;
    overflow-y:auto;
    padding:20px;
}
#videoPopup video{
    width:100%;
    max-width:500px;
    border-radius:15px;
    box-shadow:0 0 50px rgba(255,255,255,0.5);
}
#videoPopup a{
    margin-top:15px;
    padding:10px 20px;
    font-size:16px;
    display:inline-block;
    margin:10px 5px 0 5px;
    background:#ff4d6d;
    color:white;
    border-radius:30px;
    text-decoration:none;
}
.back-btn{
    margin-top:15px;
    padding:10px 20px;
    font-size:16px;
    display:inline-block;
    margin:10px 5px 0 5px;
    background:#6c5ce7;
    color:white;
    border-radius:30px;
    text-decoration:none;
}
#videoPopup a:hover{
    background:#ff1e4d;
}
.back-btn:hover{
    background:#5649c0;
}
#videoPopup .close{
    position:absolute;
    top:15px;
    right:20px;
    font-size:40px;
    color:white;
    cursor:pointer;
}

canvas{
    position:fixed;
    top:0; left:0;
    pointer-events:none;
    z-index:998;
}
</style>
</head>
<body>

<h1>🎉 Final Birthday Surprise 🎉</h1>
<div class="cake">🎂</div>
<h2>Make a Wish Bhavya 💖</h2>

<button onclick="openVideo()">Blow Candle 🎊</button>
<br><br>
<a href="index.html"><button>⬅ Back</button></a>

<div id="videoPopup">
    <span class="close" onclick="closeVideo()">&times;</span>
    <video id="birthdayVideo" controls autoplay>
        <source src="video.mp4" type="video/mp4">
        Your browser does not support the video tag.
    </video>
    <a id="downloadLink" href="birthday_video.mp4" download>⬇ Download Video</a>
    <a href="index.html" class="back-btn">⬅ Back to Home</a>
</div>

<audio id="music" src="bday.mp3" loop></audio>

<canvas id="confetti"></canvas>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
<script>
function openVideo(){
    const popup = document.getElementById("videoPopup");
    const video = document.getElementById("birthdayVideo");
    popup.style.display = "flex";
    video.currentTime = 0;
    video.play();

    const music = document.getElementById("music");
    if(music.paused){
        music.volume = 0.2;
        music.play();
    }

    for(let i=0;i<5;i++){
        confetti({particleCount:50, spread:120, origin:{y:0.6}});
    }

    for(let i=0;i<30;i++){
        createSparkle();
    }
}

function closeVideo(){
    const popup = document.getElementById("videoPopup");
    const video = document.getElementById("birthdayVideo");
    video.pause();
    popup.style.display = "none";
}

function createSparkle(){
    const sparkle = document.createElement('div');
    sparkle.innerText = '✨';
    sparkle.style.position='absolute';
    sparkle.style.left = (window.innerWidth/2 + (Math.random()*200-100))+'px';
    sparkle.style.top = (window.innerHeight/2 + (Math.random()*200-100))+'px';
    sparkle.style.fontSize = (15 + Math.random()*25)+'px';
    sparkle.style.pointerEvents='none';
    sparkle.style.opacity = 1;
    document.body.appendChild(sparkle);

    const anim = sparkle.animate([
        {transform:'translateY(0px) scale(1)', opacity:1},
        {transform:'translateY(-200px) scale(0.5)', opacity:0}
    ],{
        duration:2000 + Math.random()*1000,
        easing:'ease-out'
    });
    anim.onfinish = ()=> sparkle.remove();
}

function createBalloon(){
    let balloon = document.createElement('div');
    balloon.innerText='🎈';
    balloon.style.position='absolute';
    balloon.style.left = Math.random()*window.innerWidth+'px';
    balloon.style.fontSize = (20+Math.random()*30)+'px';
    balloon.style.pointerEvents='none';
    document.body.appendChild(balloon);
    balloon.animate([{transform:'translateY(0px)'},{transform:'translateY(-600px)'}],{
        duration:5000+Math.random()*5000,
        easing:'linear'
    }).onfinish = ()=> balloon.remove();
}
setInterval(createBalloon, 1000);

document.body.addEventListener("click", function(){
    const music = document.getElementById("music");
    if(music.paused){
        music.volume = 0.2;
        music.play();
    }
});
</script>
</body>
</html>
